<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESCHATON — Prompt Engine</title>
  <link rel="stylesheet" href="style.css?v=22">
</head>
<body>

  <div class="page">

    <button class="sfx-toggle" id="sfx-toggle" aria-label="Toggle sound effects">SFX</button>

    <!-- ─── Entry Page ──────────────────────────────────────────────────── -->
    <div id="page-entry" class="page-section" hidden>

      <nav class="scene-nav" aria-label="Scene types">
        <button class="scene-btn" data-scene="portent">Portent</button>
        <button class="scene-btn scene-btn--obfuscation" data-scene="obfuscation">Obfuscation</button>
      </nav>

      <main>
        <!-- ─── Entry Composer ─────────────────────────────── -->
        <section class="composer" id="composer" aria-label="Write this scene">
          <div class="composer-fields">
            <div class="composer-meta-row">
              <div class="field-group">
                <label class="field-label" for="subject-input">Subject</label>
                <input type="text" id="subject-input" class="meta-input" placeholder="Who or what" autocomplete="off" spellcheck="false">
              </div>
              <div class="field-group">
                <label class="field-label" for="figure-select">Rhetorical Figure</label>
                <select class="figure-select" id="figure-select">
                  <option value="">— none —</option>
                  <option value="Parallelism">Parallelism</option>
                  <option value="Isocolon">Isocolon</option>
                  <option value="Tricolon">Tricolon</option>
                  <option value="Antithesis">Antithesis</option>
                  <option value="Chiasmus">Chiasmus</option>
                  <option value="Asyndeton">Asyndeton</option>
                  <option value="Polysyndeton">Polysyndeton</option>
                  <option value="Anaphora">Anaphora</option>
                  <option value="Epistrophe">Epistrophe</option>
                  <option value="Symploce">Symploce</option>
                  <option value="Anadiplosis">Anadiplosis</option>
                  <option value="Ellipsis">Ellipsis</option>
                  <option value="Zeugma">Zeugma</option>
                </select>
                <div class="figure-def" id="figure-def"></div>
              </div>
            </div>
          </div>
          <textarea
            id="entry-text"
            class="entry-textarea"
            placeholder="Write the scene..."
            rows="6"
            aria-label="Scene text"
          ></textarea>
          <span id="composer-word-count" class="composer-word-count">0 words</span>
          <div class="composer-footer">
            <button class="save-btn" id="save-btn">Save Entry</button>
          </div>
        </section>
      </main>

    </div>

    <!-- ─── Timeline Page ───────────────────────────────────────────────── -->
    <div id="page-timeline" class="page-section">

      <section class="tl-section" id="tl-section" aria-label="Story timeline">
        <div id="tl-container" class="tl-container"></div>

        <div class="tl-footer">
          <div class="tl-footer-stats">
            <div class="tl-footer-stat">
              <span class="tl-footer-stat-value" id="footer-words">0</span>
              <span class="tl-footer-stat-label">words</span>
            </div>
            <div class="tl-footer-stat">
              <span class="tl-footer-stat-value" id="footer-entries">0</span>
              <span class="tl-footer-stat-label">entries</span>
            </div>
            <div class="tl-footer-stat">
              <span class="tl-footer-stat-value" id="footer-avg">0</span>
              <span class="tl-footer-stat-label">avg words</span>
            </div>
          </div>
          <div class="tl-footer-icons">
          <div class="icon-btn new-entry-chip" draggable="true" id="new-entry-drag" title="Drag to insert a new entry" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v3h-3a.5.5 0 0 0 0 1h3v3a.5.5 0 0 0 1 0v-3h3a.5.5 0 0 0 0-1h-3z"/>
            </svg>
          </div>
          <button class="icon-btn" id="export-md-btn" aria-label="Export story as Markdown" title="Export Markdown">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M12 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2M5 4h6a.5.5 0 0 1 0 1H5a.5.5 0 0 1 0-1m-.5 2.5A.5.5 0 0 1 5 6h6a.5.5 0 0 1 0 1H5a.5.5 0 0 1-.5-.5M5 8h6a.5.5 0 0 1 0 1H5a.5.5 0 0 1 0-1m0 2h3a.5.5 0 0 1 0 1H5a.5.5 0 0 1 0-1"/>
            </svg>
          </button>
          <button class="icon-btn" id="export-clear-btn" aria-label="Export story then erase all entries" title="Export &amp; Erase">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
              <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708"/>
            </svg>
          </button>
          <button class="icon-btn" id="export-btn" aria-label="Export story as JSON file" title="Export JSON">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.5 4.5a.5.5 0 0 0-1 0v5.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293z"/>
            </svg>
          </button>
          <!-- label triggers the hidden file input — a standard pattern -->
          <label class="icon-btn" id="import-label" for="import-input" role="button" tabindex="0" aria-label="Import story from JSON file" title="Import JSON">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
              <path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-7.5 3.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707z"/>
            </svg>
          </label>
          <input type="file" id="import-input" accept=".json" hidden>
          </div>
        </div>
      </section>

    </div>

    <footer>
      <p>ESCHATON</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
